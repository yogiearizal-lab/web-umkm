<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKM PromptGen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.15);
            --accent: #5b5ef4;
            --accent2: #9b87f5;
            --accent-glow: rgba(91,94,244,0.25);
            --text: #f0f0f5;
            --text-muted: #666678;
            --text-dim: #999aaa;
            --green: #38e5a0;
            --yellow: #f5c842;
            --orange: #f57842;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(91,94,244,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(155,135,245,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 max(24px, calc((100vw - 1200px)/2));
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: grid;
            place-items: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-icon svg { width: 20px; height: 20px; color: white; }

        .logo-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff 60%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .badge {
            background: rgba(91,94,244,0.15);
            border: 1px solid rgba(91,94,244,0.3);
            color: var(--accent2);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 56px;
            padding-top: 8px;
        }

        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(91,94,244,0.1);
            border: 1px solid rgba(91,94,244,0.2);
            color: var(--accent2);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero h2 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            color: var(--text);
            margin-bottom: 16px;
        }

        .hero h2 em {
            font-style: normal;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: var(--text-dim);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.7;
            font-weight: 300;
        }

        /* Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; }
        }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 32px; }

        .cat-label {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .template-list { display: flex; flex-direction: column; gap: 8px; }

        .template-btn {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        .template-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .template-btn:hover {
            border-color: var(--border-hover);
            background: var(--surface2);
            transform: translateX(2px);
        }

        .template-btn.active {
            border-color: rgba(91,94,244,0.5);
            background: rgba(91,94,244,0.08);
            box-shadow: 0 0 0 1px rgba(91,94,244,0.3), inset 0 0 20px rgba(91,94,244,0.05);
        }

        .template-btn.active .btn-title { color: #fff; }

        .btn-icon {
            width: 36px;
            height: 36px;
            background: var(--surface2);
            border-radius: 9px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            border: 1px solid var(--border);
            position: relative;
        }

        .template-btn.active .btn-icon {
            background: rgba(91,94,244,0.2);
            border-color: rgba(91,94,244,0.3);
        }

        .btn-icon svg { width: 16px; height: 16px; }

        .btn-content { flex: 1; min-width: 0; position: relative; }

        .btn-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 4px;
            transition: color 0.2s;
        }

        .btn-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Right panel */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }

        /* Form Card */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header-left h3 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header-left h3 .sep {
            color: var(--text-muted);
            font-weight: 300;
        }

        .card-header-left h3 .template-name { color: var(--accent2); }

        .card-header-left p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

        .field-group { display: flex; flex-direction: column; gap: 8px; }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.3px;
        }

        .field-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            outline: none;
            width: 100%;
        }

        .field-input::placeholder { color: var(--text-muted); }

        .field-input:focus {
            border-color: rgba(91,94,244,0.5);
            background: rgba(91,94,244,0.04);
            box-shadow: 0 0 0 3px rgba(91,94,244,0.1);
        }

        /* Result Card */
        .result-card {
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .result-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
        }

        .result-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .pulse-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(56,229,160,0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .copy-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--border-hover);
        }

        .copy-btn.copied {
            background: rgba(56,229,160,0.1);
            border-color: rgba(56,229,160,0.3);
            color: var(--green);
        }

        .copy-btn svg { width: 14px; height: 14px; }

        .result-body {
            padding: 24px;
            background: rgba(91,94,244,0.02);
        }

        .result-textarea {
            width: 100%;
            min-height: 280px;
            background: transparent;
            border: none;
            color: #b8b9cf;
            font-family: 'DM Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        .result-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .result-footer svg { width: 14px; height: 14px; color: var(--yellow); flex-shrink: 0; margin-top: 2px; }

        .result-footer p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .result-footer strong { color: var(--accent2); font-weight: 600; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 20px; }

        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Category divider line */
        .sidebar-section { display: flex; flex-direction: column; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <div class="logo-text">
                <h1>UMKM PromptGen</h1>
                <span>Riset &amp; Positioning Assistant</span>
            </div>
        </div>
        <div class="badge">v2.0</div>
    </div>
</header>

<main>
    <div class="hero">
        <div class="hero-label">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
            AI-Powered Tool
        </div>
        <h2>Buat Prompt yang <em>Tajam</em><br>untuk Bisnis Anda</h2>
        <p>Isi detail bisnis Anda, dapatkan prompt siap pakai untuk riset pasar &amp; strategi brand.</p>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar"></div>

        <!-- Right Panel -->
        <div class="right-panel" id="right-panel"></div>
    </div>
</main>

<script>
    const templates = [
        {
            id: 'mr-competitor',
            category: 'Riset Market',
            iconColor: '#5b8ef4',
            iconSvg: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
            title: 'Analisis Kompetitor Area',
            desc: 'Pahami peta persaingan dan cari celah (niche) yang bisa dimanfaatkan.',
            fields: [
                { id: 'produk', label: 'Produk / Jasa yang Dijual', placeholder: 'Contoh: Kopi Susu Gula Aren' },
                { id: 'lokasi', label: 'Lokasi Bisnis / Area Target', placeholder: 'Contoh: Jakarta Selatan' }
            ],
            generate: d => `Saya sedang menjalankan UMKM yang menjual ${d.produk||'[Produk]'}. Target operasional saya berada di area ${d.lokasi||'[Lokasi]'}.\n\nTolong bertindak sebagai Konsultan Bisnis dan buatkan riset pasar singkat yang mencakup:\n1. 3 profil imajiner kompetitor utama di area ini beserta kekuatan & kelemahan mereka.\n2. Analisis peluang (celah pasar) yang belum banyak digarap oleh kompetitor tersebut.\n3. Rekomendasi 3 inovasi sederhana yang bisa saya terapkan agar produk saya lebih menonjol.`
        },
        {
            id: 'mr-audience',
            category: 'Riset Market',
            iconColor: '#9b87f5',
            iconSvg: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
            title: 'Pembuatan Buyer Persona',
            desc: 'Kenali pelanggan ideal yang paling mungkin membeli produk Anda.',
            fields: [
                { id: 'produk', label: 'Produk / Jasa', placeholder: 'Contoh: Skincare Organik' },
                { id: 'harga', label: 'Rentang Harga', placeholder: 'Contoh: Rp 50.000 – Rp 150.000' },
                { id: 'masalah', label: 'Masalah yang Diselesaikan Produk', placeholder: 'Contoh: Kulit kusam dan berjerawat' }
            ],
            generate: d => `Bisnis UMKM saya memproduksi ${d.produk||'[Produk]'} dengan rentang harga ${d.harga||'[Rentang Harga]'}. Produk ini diciptakan untuk menyelesaikan masalah: ${d.masalah||'[Masalah Pelanggan]'}.\n\nTolong buatkan 2 "Buyer Persona" (profil pelanggan ideal) yang sangat spesifik untuk produk ini. Untuk masing-masing persona, jabarkan:\n- Demografi (Umur, Pekerjaan, Pendapatan)\n- Psikografi (Minat, Gaya Hidup, Nilai yang dianut)\n- Pain Points (Ketakutan atau masalah utama mereka)\n- Bagaimana produk saya bisa menjadi pahlawan (solusi) untuk mereka.`
        },
        {
            id: 'bp-usp',
            category: 'Brand Positioning',
            iconColor: '#f5c842',
            iconSvg: '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
            title: 'Merumuskan USP',
            desc: 'Temukan alasan kuat mengapa pelanggan harus memilih Anda.',
            fields: [
                { id: 'produk', label: 'Produk / Jasa', placeholder: 'Contoh: Jasa Cuci Sepatu' },
                { id: 'keunggulan1', label: 'Kelebihan Utama #1', placeholder: 'Contoh: Pengerjaan hanya 1 hari' },
                { id: 'keunggulan2', label: 'Kelebihan Utama #2', placeholder: 'Contoh: Pakai sabun khusus anti bakteri' }
            ],
            generate: d => `Saya memiliki usaha ${d.produk||'[Produk]'}. Saya merasa keunggulan utama bisnis saya dibandingkan kompetitor adalah: 1) ${d.keunggulan1||'[Keunggulan 1]'} dan 2) ${d.keunggulan2||'[Keunggulan 2]'}.\n\nTolong bantu saya merumuskan Unique Selling Proposition (USP) yang kuat. Berikan:\n1. 3 Pilihan kalimat USP yang padat, menarik, dan mudah diingat (maksimal 2 kalimat per pilihan).\n2. Slogan singkat (tagline) dari masing-masing USP tersebut.\n3. Saran bagaimana cara mengkomunikasikan USP ini di bio Instagram bisnis saya.`
        },
        {
            id: 'bp-voice',
            category: 'Brand Positioning',
            iconColor: '#38e5a0',
            iconSvg: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
            title: 'Brand Voice & Gaya Bahasa',
            desc: 'Buat pedoman cara brand Anda berbicara di media sosial.',
            fields: [
                { id: 'brand', label: 'Nama Brand', placeholder: 'Contoh: NgemilYuk' },
                { id: 'target', label: 'Target Audiens', placeholder: 'Contoh: Anak sekolah dan mahasiswa' },
                { id: 'sifat', label: 'Kesan Brand yang Diinginkan', placeholder: 'Contoh: Asik, gaul, receh, tapi terpercaya' }
            ],
            generate: d => `Nama brand UMKM saya adalah ${d.brand||'[Nama Brand]'}. Target pasar utama kami adalah ${d.target||'[Target Audiens]'}. Saya ingin brand ini memiliki sifat/karakter yang ${d.sifat||'[Kesan Brand]'}.\n\nSebagai ahli Branding, tolong buatkan panduan Brand Voice (Gaya Komunikasi) yang mencakup:\n1. Aturan Do's and Don'ts (Apa yang boleh dan tidak boleh dikatakan/dilakukan saat membalas chat atau bikin caption).\n2. Panggilan yang cocok dari brand ke audiens (misal: Sobat, Kak, Min, dll).\n3. Buatkan 2 contoh caption Instagram (1 untuk edukasi produk, 1 untuk promosi diskon) menggunakan gaya bahasa tersebut.`
        }
    ];

    let selected = templates[0];
    let formData = {};

    function svgIcon(paths, color) {
        return `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        const cats = [...new Set(templates.map(t => t.category))];
        sidebar.innerHTML = cats.map(cat => `
            <div class="sidebar-section">
                <div class="cat-label">${cat}</div>
                <div class="template-list">
                    ${templates.filter(t => t.category === cat).map(t => `
                        <button class="template-btn ${t.id === selected.id ? 'active' : ''}" onclick="selectTemplate('${t.id}')">
                            <div class="btn-icon">${svgIcon(t.iconSvg, t.iconColor)}</div>
                            <div class="btn-content">
                                <div class="btn-title">${t.title}</div>
                                <div class="btn-desc">${t.desc}</div>
                            </div>
                        </button>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function renderRightPanel() {
        const panel = document.getElementById('right-panel');
        const generated = selected.generate(formData);
        panel.innerHTML = `
            <div class="form-card fade-in">
                <div class="card-header">
                    <div class="card-header-left">
                        <h3>Kustomisasi Prompt <span class="sep">/</span> <span class="template-name">${selected.title}</span></h3>
                        <p>Isi detail bisnis Anda agar prompt yang dihasilkan lebih spesifik.</p>
                    </div>
                </div>
                <div class="card-body">
                    ${selected.fields.map(f => `
                        <div class="field-group">
                            <label class="field-label">${f.label}</label>
                            <input class="field-input" type="text" placeholder="${f.placeholder}" value="${(formData[f.id]||'').replace(/"/g,'&quot;')}" oninput="updateField('${f.id}', this.value)" />
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="result-card fade-in">
                <div class="result-header">
                    <div class="result-title">
                        <div class="pulse-dot"></div>
                        Hasil Prompt — Siap Disalin
                    </div>
                    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Salin Prompt
                    </button>
                </div>
                <div class="result-body">
                    <textarea class="result-textarea" readonly id="resultArea">${escapeHtml(generated)}</textarea>
                </div>
                <div class="result-footer">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    <p><strong>Tips:</strong> Salin prompt ini dan tempelkan ke AI Assistant (ChatGPT, Claude, atau Gemini) untuk mendapatkan riset &amp; strategi bisnis Anda.</p>
                </div>
            </div>
        `;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function selectTemplate(id) {
        selected = templates.find(t => t.id === id);
        formData = {};
        renderSidebar();
        renderRightPanel();
    }

    function updateField(id, value) {
        formData[id] = value;
        const area = document.getElementById('resultArea');
        if (area) area.value = selected.generate(formData);
    }

    function copyPrompt() {
        const area = document.getElementById('resultArea');
        const btn = document.getElementById('copyBtn');
        if (!area || !btn) return;
        navigator.clipboard.writeText(area.value).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg> Tersalin!`;
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Salin Prompt`;
            }, 2000);
        }).catch(() => {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = area.value;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        });
    }

    renderSidebar();
    renderRightPanel();
</script>
</body>
</html>
